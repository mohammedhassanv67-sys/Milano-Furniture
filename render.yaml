services:
  - type: web
    name: milano-furniture
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: UPLOADS_PATH
        value: /data/uploads
    disks:
      - name: persistent-data
        mountPath: /data
        sizeGB: 1
