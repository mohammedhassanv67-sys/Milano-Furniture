services:
  - type: web
    name: milano-furniture
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/milano.db
      - key: UPLOADS_PATH
        value: /data/uploads
    disks:
      - name: persistent-data
        mountPath: /data
        sizeGB: 1
