<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تفاصيل المنتج - Milano Furniture</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .product-detail { padding: 120px 0 60px; min-height: 100vh; }

    .gallery-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }

    /* Main Image */
    .main-image-wrapper { position: relative; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); background: #f5f5f5; }
    .main-image-wrapper img { width: 100%; height: 500px; object-fit: contain; cursor: zoom-in; transition: transform 0.3s; background: #f8f8f8; image-rendering: -webkit-optimize-contrast; }
    .main-image-wrapper img:hover { transform: scale(1.02); }

    .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 45px; height: 45px; border-radius: 50%;
      background: rgba(197,165,114,0.9); color: white; border: none;
      font-size: 1.1rem; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-nav:hover { background: var(--gold); transform: translateY(-50%) scale(1.1); }
    .gallery-nav.prev { right: 12px; }
    .gallery-nav.next { left: 12px; }

    .image-counter {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: white; padding: 4px 14px;
      border-radius: 15px; font-size: 0.85rem;
    }

    /* Thumbnails */
    .thumbnails { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .thumb {
      width: 80px; height: 80px; border-radius: 10px; overflow: hidden;
      cursor: pointer; border: 3px solid transparent; transition: var(--transition); opacity: 0.6;
    }
    .thumb.active { border-color: var(--gold); opacity: 1; }
    .thumb:hover { opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: contain; background: #f0f0f0; }

    /* Video Section */
    .video-section { margin-top: 20px; }
    .video-section video { width: 100%; border-radius: 15px; }

    /* Product Info */
    .detail-info { padding: 10px 0; }
    .detail-info .category-badge {
      display: inline-block; background: var(--gold); color: white;
      padding: 6px 18px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 15px;
    }
    .detail-info h1 { font-size: 2.5rem; margin-bottom: 15px; color: var(--black); }
    .detail-info .price { font-size: 2rem; color: var(--gold-dark); font-weight: 700; margin-bottom: 20px; }
    .detail-info .description { color: var(--gray); font-size: 1.1rem; line-height: 1.8; margin-bottom: 25px; }

    .detail-info .status { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; }
    .status-dot.available { background: var(--success); }
    .status-dot.unavailable { background: var(--danger); }

    .share-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .share-btn-detail {
      padding: 10px 20px; border-radius: 25px; border: none;
      cursor: pointer; font-size: 0.95rem; font-weight: 600;
      transition: var(--transition); display: flex; align-items: center; gap: 8px;
      font-family: 'Cairo', sans-serif;
    }
    .share-btn-detail.whatsapp { background: #25D366; color: white; }
    .share-btn-detail.facebook { background: #1877F2; color: white; }
    .share-btn-detail.twitter { background: #1DA1F2; color: white; }
    .share-btn-detail:hover { transform: translateY(-2px); opacity: 0.9; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--gold); font-size: 1rem; margin-bottom: 25px; transition: var(--transition);
    }
    .back-btn:hover { color: var(--gold-dark); }

    @media (max-width: 768px) {
      .product-detail { padding: 90px 0 40px; }
      .gallery-section { grid-template-columns: 1fr; gap: 20px; }
      .main-image-wrapper img { height: 280px; }
      .gallery-nav { width: 36px; height: 36px; font-size: 0.9rem; }
      .thumbnails { gap: 6px; }
      .thumb { width: 60px; height: 60px; border-width: 2px; }
      .detail-info h1 { font-size: 1.6rem; }
      .detail-info .price { font-size: 1.5rem; }
      .detail-info .description { font-size: 0.95rem; }
      .share-buttons { flex-wrap: wrap; gap: 8px; }
      .share-btn-detail { padding: 8px 14px; font-size: 0.85rem; }
      .video-section video { border-radius: 10px; }
    }
    @media (max-width: 480px) {
      .main-image-wrapper img { height: 220px; }
      .gallery-nav { width: 30px; height: 30px; font-size: 0.8rem; }
      .gallery-nav.prev { right: 8px; }
      .gallery-nav.next { left: 8px; }
      .thumb { width: 50px; height: 50px; }
      .detail-info h1 { font-size: 1.3rem; }
      .detail-info .price { font-size: 1.3rem; }
      .share-btn-detail { padding: 7px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-logo">
        <img src="/images/logo/logo.png" alt="Milano Logo" onerror="this.style.display='none'">
        <h1>Milano</h1>
      </a>
      <ul class="nav-links">
        <li><a href="/">الرئيسية</a></li>
        <li><a href="/#gallery">المعرض</a></li>
        <li><a href="/#contact">تواصل معنا</a></li>
      </ul>
      <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <section class="product-detail">
    <div class="container">
      <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمعرض</a>
      
      <div class="gallery-section">
        <!-- Gallery -->
        <div>
          <div class="main-image-wrapper">
            <img id="mainImage" src="/images/placeholder.jpg" alt="Product">
            <button class="gallery-nav prev" onclick="prevImage()"><i class="fas fa-chevron-right"></i></button>
            <button class="gallery-nav next" onclick="nextImage()"><i class="fas fa-chevron-left"></i></button>
            <div class="image-counter" id="imageCounter">1 / 1</div>
          </div>
          <div class="thumbnails" id="thumbnails"></div>

          <!-- Video -->
          <div class="video-section" id="videoSection" style="display:none;">
            <h3 style="margin:20px 0 10px;"><i class="fas fa-video"></i> فيديو المنتج</h3>
            <video id="productVideo" controls></video>
          </div>
        </div>

        <!-- Info -->
        <div class="detail-info">
          <span class="category-badge" id="productCategory">-</span>
          <h1 id="productName">جاري التحميل...</h1>
          <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">-</span>
          </div>
          <div class="price"><span>$</span><span id="productPrice">0</span></div>
          <p class="description" id="productDescription">-</p>
          
          <div class="share-buttons">
            <button class="share-btn-detail whatsapp" id="shareWhatsApp"><i class="fab fa-whatsapp"></i> مشاركة واتساب</button>
            <button class="share-btn-detail facebook" id="shareFacebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
            <button class="share-btn-detail twitter" id="shareTwitter"><i class="fab fa-twitter"></i> تويتر</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    let images = [];
    let currentIndex = 0;
    let productId = 0;

    document.addEventListener('DOMContentLoaded', loadProduct);

    async function loadProduct() {
      const urlParams = new URLSearchParams(window.location.search);
      productId = urlParams.get('id');
      
      if (!productId) { window.location.href = '/'; return; }
      
      try {
        const response = await fetch('/api/products/' + productId);
        const product = await response.json();
        
        document.title = product.name + ' - Milano Furniture';
        
        // Parse images
        try {
          images = JSON.parse(product.images || '[]');
        } catch {
          images = product.image_url ? [product.image_url] : [];
        }
        if (images.length === 0) images = ['/images/placeholder.jpg'];
        
        // Set main image
        showImage(0);
        renderThumbnails();
        
        // Info
        document.getElementById('productName').textContent = product.name;
        document.getElementById('productPrice').textContent = product.price.toLocaleString();
        document.getElementById('productCategory').textContent = getCategoryName(product.category);
        document.getElementById('productDescription').textContent = product.description || 'لا يوجد وصف';
        
        // Status
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        if (product.is_available) {
          dot.className = 'status-dot available';
          text.textContent = 'متاح';
          text.style.color = 'var(--success)';
        } else {
          dot.className = 'status-dot unavailable';
          text.textContent = 'غير متاح';
          text.style.color = 'var(--danger)';
        }
        
        // Video
        if (product.video_url) {
          document.getElementById('videoSection').style.display = 'block';
          document.getElementById('productVideo').src = product.video_url;
        }
        
        // Share
        const shareUrl = window.location.href;
        const shareName = product.name;
        
        document.getElementById('shareWhatsApp').onclick = () => {
          window.open(`https://wa.me/?text=${encodeURIComponent(shareName + ' - ' + shareUrl)}`, '_blank');
        };
        document.getElementById('shareFacebook').onclick = () => {
          window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
        };
        document.getElementById('shareTwitter').onclick = () => {
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareName)}&url=${encodeURIComponent(shareUrl)}`, '_blank');
        };
        
      } catch (error) {
        console.error('Error loading product:', error);
      }
    }

    function showImage(index) {
      currentIndex = index;
      document.getElementById('mainImage').src = images[index];
      document.getElementById('imageCounter').textContent = (index + 1) + ' / ' + images.length;
      
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }

    function renderThumbnails() {
      if (images.length <= 1) {
        document.querySelector('.gallery-nav').style.display = 'none';
        document.querySelector('.gallery-nav.next').style.display = 'none';
        document.getElementById('imageCounter').style.display = 'none';
        document.getElementById('thumbnails').style.display = 'none';
        return;
      }
      
      document.getElementById('thumbnails').innerHTML = images.map((url, i) => `
        <div class="thumb ${i === 0 ? 'active' : ''}" onclick="showImage(${i})">
          <img src="${url}" alt="thumb">
        </div>
      `).join('');
    }

    function nextImage() {
      showImage((currentIndex + 1) % images.length);
    }

    function prevImage() {
      showImage((currentIndex - 1 + images.length) % images.length);
    }

    function getCategoryName(cat) {
      const names = { salon: 'صالونات', bedroom: 'غرف نوم', dining: 'طاولات طعام', lshape: 'L Shape', other: 'قسم آخر', general: 'عام' };
      return names[cat] || cat;
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') prevImage();
      if (e.key === 'ArrowLeft') nextImage();
    });
  </script>
</body>
</html>
