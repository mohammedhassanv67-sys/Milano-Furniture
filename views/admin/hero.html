<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الهيرو - Milano Furniture</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo/logo.png" alt="Milano" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23C5A572%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>'">
      <h2>Milano</h2>
      <p>لوحة التحكم</p>
    </div>
    
    <nav class="sidebar-menu">
      <a href="/admin">
        <i class="fas fa-home"></i>
        <span>الرئيسية</span>
      </a>
      <a href="/admin/products">
        <i class="fas fa-box"></i>
        <span>المنتجات</span>
      </a>
      <a href="/admin/products/add">
        <i class="fas fa-plus-circle"></i>
        <span>إضافة منتج</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/hero" class="active">
        <i class="fas fa-images"></i>
        <span>إدارة الهيرو</span>
      </a>
      <a href="/admin/contact">
        <i class="fas fa-phone"></i>
        <span>معلومات التواصل</span>
      </a>
      <a href="/admin/messages">
        <i class="fas fa-envelope"></i>
        <span>الرسائل</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/users">
        <i class="fas fa-users"></i>
        <span>المستخدمين</span>
      </a>
      <div class="divider"></div>
      <a href="/" target="_blank">
        <i class="fas fa-external-link-alt"></i>
        <span>عرض الموقع</span>
      </a>
      <a href="#" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>تسجيل الخروج</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <h1><i class="fas fa-images"></i> إدارة الهيرو</h1>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Logo Section -->
    <div class="form-container" style="margin-bottom:30px;">
      <h2 style="margin-bottom:20px;"><i class="fas fa-logo"></i> لوقو المعرض</h2>
      <div style="display:flex; gap:30px; align-items:start; flex-wrap:wrap;">
        <div>
          <p style="margin-bottom:10px; color:#666;">اللوقو الحالي:</p>
          <img id="currentLogo" src="/images/logo/logo.png" alt="Logo" 
               style="width:150px; height:150px; object-fit:contain; border:2px solid #eee; border-radius:15px; padding:10px; background:#fafafa;"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23C5A572%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>'">
        </div>
        <div style="flex:1;">
          <div class="form-group">
            <label>رفع لوقو جديد</label>
            <div class="image-upload" id="logoUpload" style="padding:20px;">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>اضغط لاختيار اللوقو</p>
              <input type="file" id="logoFile" accept="image/*">
            </div>
            <img id="logoPreview" class="image-preview" alt="معاينة" style="margin-top:15px;">
          </div>
          <div class="form-group">
            <label>أو أدخل رابط اللوقو</label>
            <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
          </div>
          <button type="button" class="btn btn-primary" onclick="saveLogo()">
            <i class="fas fa-save"></i> حفظ اللوقو
          </button>
        </div>
      </div>
    </div>

    <!-- Hero Settings -->
    <div class="form-container">
      <h2 style="margin-bottom:20px;"><i class="fas fa-edit"></i> إعدادات الهيرو</h2>
      
      <form id="heroForm">
        <input type="hidden" id="heroId">
        
        <div class="form-row">
          <div class="form-group">
            <label>العنوان الرئيسي</label>
            <input type="text" id="heroTitle" placeholder="Milano Furniture">
          </div>
          
          <div class="form-group">
            <label>العنوان الفرعي</label>
            <input type="text" id="heroSubtitle" placeholder="أثاث فاخر يعكس ذوقك الرفيع">
          </div>
        </div>
        
        <div class="form-group">
          <label>صورة الخلفية</label>
          <div style="margin-bottom:15px;">
            <img id="currentBg" src="" alt="الخلفية الحالية" 
                 style="width:100%; max-height:300px; object-fit:cover; border-radius:10px; display:none;">
          </div>
          <div class="image-upload" id="bgUpload">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>اضغط لاختيار صورة خلفية جديدة</p>
            <p style="font-size:0.85rem; color:#999;">يُفضل صورة بحجم 1920x1080</p>
            <input type="file" id="bgFile" accept="image/*">
          </div>
          <img id="bgPreview" class="image-preview" alt="معاينة" style="width:100%; max-height:300px; object-fit:cover; margin-top:15px; display:none;">
          
          <div style="margin-top:15px;">
            <label>أو أدخل رابط صورة الخلفية</label>
            <input type="url" id="bgUrl" placeholder="https://example.com/background.jpg">
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="padding:14px 40px;">
          <i class="fas fa-save"></i> حفظ الإعدادات
        </button>
      </form>
    </div>
  </main>

  <script src="/js/admin.js"></script>
  <script>
    let currentBgUrl = '';
    let currentLogoUrl = '';

    document.addEventListener('DOMContentLoaded', loadHeroSettings);

    async function loadHeroSettings() {
      try {
        const response = await fetch('/api/hero/all');
        const heroes = await response.json();
        
        if (heroes.length > 0) {
          const hero = heroes[0];
          document.getElementById('heroId').value = hero.id;
          document.getElementById('heroTitle').value = hero.title || '';
          document.getElementById('heroSubtitle').value = hero.subtitle || '';
          document.getElementById('bgUrl').value = hero.background_image || '';
          document.getElementById('logoUrl').value = hero.logo_url || '';
          
          currentBgUrl = hero.background_image || '';
          currentLogoUrl = hero.logo_url || '';
          
          if (hero.background_image) {
            const currentBg = document.getElementById('currentBg');
            currentBg.src = hero.background_image;
            currentBg.style.display = 'block';
          }
          
          if (hero.logo_url) {
            const currentLogo = document.getElementById('currentLogo');
            currentLogo.src = hero.logo_url;
          }
        }
      } catch (error) {
        console.error('Error loading hero:', error);
      }
    }

    // Logo upload
    document.getElementById('logoUpload').addEventListener('click', () => {
      document.getElementById('logoFile').click();
    });

    document.getElementById('logoFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const preview = document.getElementById('logoPreview');
          preview.src = event.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    async function saveLogo() {
      try {
        const fileInput = document.getElementById('logoFile');
        let logoUrl = document.getElementById('logoUrl').value;
        
        if (fileInput.files[0]) {
          logoUrl = await uploadImage(fileInput.files[0]);
        }
        
        if (!logoUrl) {
          showAlert('الرجاء اختيار لوقو', 'danger');
          return;
        }
        
        // Update hero settings with new logo
        const heroId = document.getElementById('heroId').value;
        const title = document.getElementById('heroTitle').value || 'Milano Furniture';
        const subtitle = document.getElementById('heroSubtitle').value || 'أثاث فاخر يعكس ذوقك الرفيع';
        
        if (heroId) {
          await fetch('/api/hero/' + heroId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title,
              subtitle,
              background_image: document.getElementById('bgUrl').value || currentBgUrl,
              logo_url: logoUrl,
              is_active: 1
            })
          });
        } else {
          await fetch('/api/hero', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title,
              subtitle,
              background_image: document.getElementById('bgUrl').value || currentBgUrl,
              logo_url: logoUrl
            })
          });
        }
        
        showAlert('تم حفظ اللوقو بنجاح!', 'success');
        document.getElementById('currentLogo').src = logoUrl;
      } catch (error) {
        showAlert('حدث خطأ أثناء الحفظ', 'danger');
      }
    }

    // Background upload
    document.getElementById('bgUpload').addEventListener('click', () => {
      document.getElementById('bgFile').click();
    });

    document.getElementById('bgFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const preview = document.getElementById('bgPreview');
          preview.src = event.target.result;
          preview.style.display = 'block';
          document.getElementById('currentBg').style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('heroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
      
      try {
        let bgUrl = document.getElementById('bgUrl').value || currentBgUrl;
        
        const bgFile = document.getElementById('bgFile').files[0];
        if (bgFile) {
          bgUrl = await uploadImage(bgFile);
        }
        
        const heroData = {
          title: document.getElementById('heroTitle').value,
          subtitle: document.getElementById('heroSubtitle').value,
          background_image: bgUrl,
          logo_url: document.getElementById('logoUrl').value || currentLogoUrl,
          is_active: 1
        };
        
        const heroId = document.getElementById('heroId').value;
        let response;
        
        if (heroId) {
          response = await fetch('/api/hero/' + heroId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(heroData)
          });
        } else {
          response = await fetch('/api/hero', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(heroData)
          });
        }
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('تم حفظ الإعدادات بنجاح!', 'success');
          loadHeroSettings();
        } else {
          showAlert('حدث خطأ أثناء الحفظ', 'danger');
        }
      } catch (error) {
        showAlert('حدث خطأ: ' + error.message, 'danger');
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-save"></i> حفظ الإعدادات';
    });
  </script>
</body>
</html>
