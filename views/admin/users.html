<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المستخدمين - Milano Furniture</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo/logo.png" alt="Milano" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23C5A572%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>'">
      <h2>Milano</h2>
      <p>لوحة التحكم</p>
    </div>
    <nav class="sidebar-menu">
      <a href="/admin"><i class="fas fa-home"></i><span>الرئيسية</span></a>
      <a href="/admin/products"><i class="fas fa-box"></i><span>المنتجات</span></a>
      <a href="/admin/products/add"><i class="fas fa-plus-circle"></i><span>إضافة منتج</span></a>
      <div class="divider"></div>
      <a href="/admin/hero"><i class="fas fa-images"></i><span>إدارة الهيرو</span></a>
      <a href="/admin/contact"><i class="fas fa-phone"></i><span>معلومات التواصل</span></a>
      <a href="/admin/messages"><i class="fas fa-envelope"></i><span>الرسائل</span></a>
      <div class="divider"></div>
      <a href="/admin/users" class="active"><i class="fas fa-users"></i><span>المستخدمين</span></a>
      <div class="divider"></div>
      <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i><span>عرض الموقع</span></a>
      <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></a>
    </nav>
  </aside>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay"></div>

  <main class="main-content">
    <div class="top-bar">
      <div class="top-bar-logo">
        <button class="sidebar-toggle"><i class="fas fa-bars"></i></button>
        <img src="/images/logo/logo.png" alt="Milano" onerror="this.style.display='none'">
      </div>
      <h1><i class="fas fa-users"></i> إدارة المستخدمين</h1>
    </div>

    <div id="alert" class="alert"></div>

    <div class="table-container">
      <div class="table-header">
        <h2>جميع المستخدمين (<span id="userCount">0</span>)</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>المعرف</th>
            <th>اسم المستخدم</th>
            <th>الرتبة</th>
            <th>تاريخ الإنشاء</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="5" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Reset Password Modal -->
  <div class="modal" id="passwordModal">
    <div class="modal-content" style="max-width:400px;">
      <h3><i class="fas fa-key"></i> تغيير كلمة المرور</h3>
      <p id="resetUser" style="margin:15px 0;"></p>
      <div class="form-group">
        <label>كلمة المرور الجديدة</label>
        <input type="password" id="newPassword" placeholder="8 أحرف على الأقل" style="width:100%; padding:12px; border:2px solid #eee; border-radius:10px; font-family:'Cairo',sans-serif;">
      </div>
      <div style="margin-top:15px;">
        <button class="btn btn-primary" onclick="resetPassword()"><i class="fas fa-save"></i> حفظ</button>
        <button class="modal-close" onclick="closePasswordModal()" style="background:var(--gray); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-right:10px;">إغلاق</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    let resetUserId = null;

    document.addEventListener('DOMContentLoaded', loadUsers);

    async function loadUsers() {
      try {
        const response = await fetch('/api/users');
        const users = await response.json();
        
        document.getElementById('userCount').textContent = users.length;
        const tbody = document.getElementById('usersTable');
        
        tbody.innerHTML = users.map(user => `
          <tr>
            <td>#${user.id}</td>
            <td><strong>${user.username}</strong></td>
            <td>
              <select onchange="changeRole(${user.id}, this.value)" style="padding:6px 12px; border:2px solid #eee; border-radius:8px; font-family:'Cairo',sans-serif; font-weight:600; ${user.role === 'admin' ? 'color:#C5A572;' : 'color:#666;'}">
                <option value="user" ${user.role === 'user' ? 'selected' : ''}>مستخدم</option>
                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>مدير</option>
              </select>
            </td>
            <td>${new Date(user.created_at).toLocaleDateString('ar-SA')}</td>
            <td>
              <div class="btn-group">
                <button class="btn btn-info btn-sm" onclick="showResetPassword(${user.id}, '${user.username}')" title="تغيير كلمة المرور">
                  <i class="fas fa-key"></i>
                </button>
                ${user.username !== 'admin' ? `
                  <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})" title="حذف">
                    <i class="fas fa-trash"></i>
                  </button>
                ` : ''}
              </div>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function changeRole(userId, role) {
      try {
        await fetch('/api/users/' + userId + '/role', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role })
        });
        showAlert('تم تغيير الرتبة بنجاح', 'success');
        loadUsers();
      } catch (error) {
        showAlert('حدث خطأ', 'danger');
      }
    }

    async function deleteUser(id) {
      if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟')) return;
      try {
        const response = await fetch('/api/users/' + id, { method: 'DELETE' });
        const data = await response.json();
        if (data.success) {
          showAlert('تم الحذف بنجاح', 'success');
          loadUsers();
        } else {
          showAlert(data.error, 'danger');
        }
      } catch (error) {
        showAlert('حدث خطأ', 'danger');
      }
    }

    function showResetPassword(userId, username) {
      resetUserId = userId;
      document.getElementById('resetUser').textContent = 'تغيير كلمة مرور: ' + username;
      document.getElementById('newPassword').value = '';
      document.getElementById('passwordModal').classList.add('active');
    }

    async function resetPassword() {
      if (!resetUserId) return;
      const password = document.getElementById('newPassword').value;
      
      if (password.length < 8) {
        showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'danger');
        return;
      }
      
      try {
        const response = await fetch('/api/users/' + resetUserId + '/password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (data.success) {
          showAlert('تم تغيير كلمة المرور بنجاح', 'success');
          closePasswordModal();
        } else {
          showAlert(data.error, 'danger');
        }
      } catch (error) {
        showAlert('حدث خطأ', 'danger');
      }
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
      resetUserId = null;
    }

    document.getElementById('passwordModal').addEventListener('click', (e) => {
      if (e.target.id === 'passwordModal') closePasswordModal();
    });
  </script>
</body>
</html>
