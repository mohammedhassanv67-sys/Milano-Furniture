<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>إدارة المنتجات - Milano Furniture</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo/logo.png" alt="Milano" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23C5A572%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>'">
      <h2>Milano</h2>
      <p>لوحة التحكم</p>
    </div>
    
    <nav class="sidebar-menu">
      <a href="/admin">
        <i class="fas fa-home"></i>
        <span>الرئيسية</span>
      </a>
      <a href="/admin/products" class="active">
        <i class="fas fa-box"></i>
        <span>المنتجات</span>
      </a>
      <a href="/admin/products/add">
        <i class="fas fa-plus-circle"></i>
        <span>إضافة منتج</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/hero">
        <i class="fas fa-images"></i>
        <span>إدارة الهيرو</span>
      </a>
      <a href="/admin/contact">
        <i class="fas fa-phone"></i>
        <span>معلومات التواصل</span>
      </a>
      <a href="/admin/messages">
        <i class="fas fa-envelope"></i>
        <span>الرسائل</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/users">
        <i class="fas fa-users"></i>
        <span>المستخدمين</span>
      </a>
      <div class="divider"></div>
      <a href="/" target="_blank">
        <i class="fas fa-external-link-alt"></i>
        <span>عرض الموقع</span>
      </a>
      <a href="#" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>تسجيل الخروج</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <h1><i class="fas fa-box"></i> إدارة المنتجات</h1>
      <div class="top-bar-actions">
        <a href="/admin/products/add" class="btn btn-primary">
          <i class="fas fa-plus"></i> إضافة منتج
        </a>
      </div>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Products Table -->
    <div class="table-container">
      <div class="table-header">
        <h2>جميع المنتجات (<span id="productCount">0</span>)</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>الصورة</th>
            <th>الاسم</th>
            <th>الوصف</th>
            <th>السعر</th>
            <th>التصنيف</th>
            <th>الحالة</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="productsTable">
          <tr>
            <td colspan="7" style="text-align:center; padding:40px;">
              <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- QR Modal -->
  <div class="modal" id="qrModal">
    <div class="modal-content">
      <h3><i class="fas fa-qrcode"></i> كود QR للمنتج</h3>
      <p id="qrProductName"></p>
      <img id="qrImage" src="" alt="QR Code">
      <p id="qrUrl" style="word-break:break-all; color:#666; font-size:0.9rem;"></p>
      <div style="margin-top:15px;">
        <a id="qrDownload" href="" download class="btn btn-primary">
          <i class="fas fa-download"></i> تحميل QR
        </a>
        <button class="btn btn-success" id="qrPrintA4" onclick="printA4FromQR()">
          <i class="fas fa-print"></i> طباعة A4
        </button>
        <button class="modal-close" onclick="closeQRModal()">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- A4 Print Modal -->
  <div class="modal" id="a4Modal">
    <div class="modal-content" style="max-width:600px;">
      <h3><i class="fas fa-print"></i> طباعة A4</h3>
      <p id="a4ProductName"></p>
      <div id="a4Preview" style="background:white; border:2px solid #ddd; border-radius:10px; padding:30px; margin:15px 0; text-align:center;">
        <div id="a4QRContainer">
          <img id="a4QRImage" src="" alt="QR Code" style="width:200px; height:200px;">
        </div>
        <div id="a4LogoContainer" style="margin-top:30px;">
          <img id="a4LogoImage" src="/images/logo/logo.png" alt="Milano Logo" style="width:80px; height:80px; object-fit:contain;" onerror="this.style.display='none'">
        </div>
        <h2 style="margin-top:15px; font-family:'Playfair Display',serif; color:#C5A572; font-size:1.8rem;">Milano Furniture</h2>
      </div>
      <div style="margin-top:15px;">
        <button class="btn btn-primary" onclick="printA4Sheet()">
          <i class="fas fa-print"></i> طباعة الآن
        </button>
        <button class="btn btn-success" onclick="downloadA4Sheet()">
          <i class="fas fa-download"></i> تحميل كصورة
        </button>
        <button class="modal-close" onclick="closeA4Modal()">إغلاق</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadProducts);

    async function loadProducts() {
      try {
        const response = await fetch('/api/products');
        const products = await response.json();
        
        document.getElementById('productCount').textContent = products.length;
        
        const tbody = document.getElementById('productsTable');
        
        if (products.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="7" style="text-align:center; padding:60px;">
                <i class="fas fa-box" style="font-size:3rem; color:#C5A572; margin-bottom:15px; display:block;"></i>
                <h3>لا توجد منتجات بعد</h3>
                <a href="/admin/products/add" class="btn btn-primary" style="margin-top:15px;">
                  <i class="fas fa-plus"></i> أضف أول منتج
                </a>
              </td>
            </tr>
          `;
          return;
        }
        
        tbody.innerHTML = products.map(product => {
          let thumb = '/images/placeholder.jpg';
          try {
            const imgs = JSON.parse(product.images || '[]');
            if (imgs.length > 0) thumb = imgs[0];
          } catch {}
          return `
          <tr>
            <td>
              <img src="${thumb}" 
                   class="product-thumb" 
                   alt="${product.name}"
                   onerror="this.src='/images/placeholder.jpg'">
            </td>
            <td><strong>${product.name}</strong></td>
            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              ${product.description || '-'}
            </td>
            <td><strong>$${product.price.toLocaleString()}</strong></td>
            <td><span class="status-badge available">${product.category}</span></td>
            <td>
              <span class="status-badge ${product.is_available ? 'available' : 'unavailable'}">
                ${product.is_available ? 'متاح' : 'غير متاح'}
              </span>
            </td>
            <td>
              <div class="btn-group">
                <button class="btn btn-info btn-sm" onclick="showQR(${product.id}, '${product.name.replace(/'/g, "\\'")}')" title="QR Code">
                  <i class="fas fa-qrcode"></i>
                </button>
                <button class="btn btn-success btn-sm" onclick="printA4(${product.id}, '${product.name.replace(/'/g, "\\'")}')" title="طباعة A4">
                  <i class="fas fa-print"></i>
                </button>
                <a href="/admin/products/edit/${product.id}" class="btn btn-primary btn-sm" title="تعديل">
                  <i class="fas fa-edit"></i>
                </a>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})" title="حذف">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        `;
        }).join('');
        
      } catch (error) {
        console.error('Error loading products:', error);
      }
    }

    async function deleteProduct(id) {
      if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
      
      try {
        const response = await fetch('/api/products/' + id, { method: 'DELETE' });
        const data = await response.json();
        
        if (data.success) {
          showAlert('تم حذف المنتج بنجاح', 'success');
          loadProducts();
        }
      } catch (error) {
        showAlert('حدث خطأ أثناء الحذف', 'danger');
      }
    }

    async function showQR(productId, productName) {
      try {
        const response = await fetch('/api/qr/' + productId);
        const data = await response.json();
        
        if (data.success) {
          currentQRData = data;
          currentQRProductName = productName;
          document.getElementById('qrProductName').textContent = productName;
          document.getElementById('qrImage').src = data.qr;
          document.getElementById('qrUrl').textContent = data.url;
          document.getElementById('qrDownload').href = data.qr;
          document.getElementById('qrDownload').download = `qr-${productName}.png`;
          document.getElementById('qrModal').classList.add('active');
        }
      } catch (error) {
        showAlert('حدث خطأ في توليد QR Code', 'danger');
      }
    }

    function closeQRModal() {
      document.getElementById('qrModal').classList.remove('active');
    }

    document.getElementById('qrModal').addEventListener('click', (e) => {
      if (e.target.id === 'qrModal') closeQRModal();
    });

    // A4 Print Functions
    let currentQRData = null;
    let currentQRProductName = '';

    async function printA4(productId, productName) {
      try {
        const response = await fetch('/api/qr/' + productId);
        const data = await response.json();
        
        if (data.success) {
          currentQRData = data;
          currentQRProductName = productName;
          document.getElementById('a4ProductName').textContent = productName;
          document.getElementById('a4QRImage').src = data.qr;
          document.getElementById('a4Modal').classList.add('active');
        }
      } catch (error) {
        showAlert('حدث خطأ في توليد QR Code', 'danger');
      }
    }

    function printA4FromQR() {
      if (currentQRData) {
        closeQRModal();
        document.getElementById('a4ProductName').textContent = currentQRProductName;
        document.getElementById('a4QRImage').src = currentQRData.qr;
        document.getElementById('a4Modal').classList.add('active');
      }
    }

    function closeA4Modal() {
      document.getElementById('a4Modal').classList.remove('active');
    }

    document.getElementById('a4Modal').addEventListener('click', (e) => {
      if (e.target.id === 'a4Modal') closeA4Modal();
    });

    function printA4Sheet() {
      const qrSrc = document.getElementById('a4QRImage').src;
      const logoImg = document.getElementById('a4LogoImage');
      const logoSrc = logoImg.src;
      const productName = document.getElementById('a4ProductName').textContent;
      
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Milano Furniture - ${productName}</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap');
            
            * { margin: 0; padding: 0; box-sizing: border-box; }
            
            @page { 
              size: A4; 
              margin: 0; 
            }
            
            body {
              width: 210mm;
              height: 297mm;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              font-family: 'Playfair Display', serif;
              background: white;
            }
            
            .a4-sheet {
              width: 100%;
              height: 100%;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              padding: 40mm;
            }
            
            .qr-code {
              width: 120mm;
              height: 120mm;
            }
            
            .qr-code img {
              width: 100%;
              height: 100%;
              object-fit: contain;
            }
            
            .logo {
              margin-top: 20mm;
              width: 30mm;
              height: 30mm;
            }
            
            .logo img {
              width: 100%;
              height: 100%;
              object-fit: contain;
            }
            
            .store-name {
              margin-top: 8mm;
              font-size: 28pt;
              color: #C5A572;
              font-weight: 700;
              letter-spacing: 2px;
            }
            
            @media print {
              body { margin: 0; }
              .a4-sheet { padding: 30mm; }
            }
          </style>
        </head>
        <body>
          <div class="a4-sheet">
            <div class="qr-code">
              <img src="${qrSrc}" alt="QR Code">
            </div>
            <div class="logo">
              <img src="${logoSrc}" alt="Milano Logo" onerror="this.parentElement.innerHTML='<div style=\\'width:30mm;height:30mm;background:#C5A572;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:24pt;\\'>M</div>'">
            </div>
            <div class="store-name">Milano Furniture</div>
          </div>
        </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.onload = () => {
        printWindow.print();
      };
    }

    function downloadA4Sheet() {
      const qrSrc = document.getElementById('a4QRImage').src;
      const productName = document.getElementById('a4ProductName').textContent;
      
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 794;
      canvas.height = 1123;
      
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      const qrImg = new Image();
      qrImg.crossOrigin = 'anonymous';
      qrImg.onload = () => {
        const qrSize = 400;
        const qrX = (canvas.width - qrSize) / 2;
        ctx.drawImage(qrImg, qrX, 250, qrSize, qrSize);
        
        ctx.fillStyle = '#C5A572';
        ctx.font = 'bold 50px Playfair Display, serif';
        ctx.textAlign = 'center';
        ctx.fillText('Milano Furniture', canvas.width / 2, 780);
        
        const link = document.createElement('a');
        link.download = `milano-qr-${productName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      qrImg.src = qrSrc;
    }
  </script>
</body>
</html>
