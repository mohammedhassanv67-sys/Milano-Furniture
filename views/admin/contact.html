<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>معلومات التواصل - Milano Furniture</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo/logo.png" alt="Milano" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23C5A572%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>'">
      <h2>Milano</h2>
      <p>لوحة التحكم</p>
    </div>
    
    <nav class="sidebar-menu">
      <a href="/admin">
        <i class="fas fa-home"></i>
        <span>الرئيسية</span>
      </a>
      <a href="/admin/products">
        <i class="fas fa-box"></i>
        <span>المنتجات</span>
      </a>
      <a href="/admin/products/add">
        <i class="fas fa-plus-circle"></i>
        <span>إضافة منتج</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/hero">
        <i class="fas fa-images"></i>
        <span>إدارة الهيرو</span>
      </a>
      <a href="/admin/contact" class="active">
        <i class="fas fa-phone"></i>
        <span>معلومات التواصل</span>
      </a>
      <a href="/admin/messages">
        <i class="fas fa-envelope"></i>
        <span>الرسائل</span>
      </a>
      <div class="divider"></div>
      <a href="/admin/users">
        <i class="fas fa-users"></i>
        <span>المستخدمين</span>
      </a>
      <div class="divider"></div>
      <a href="/" target="_blank">
        <i class="fas fa-external-link-alt"></i>
        <span>عرض الموقع</span>
      </a>
      <a href="#" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>تسجيل الخروج</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <h1><i class="fas fa-phone"></i> معلومات التواصل</h1>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-container">
      <form id="contactForm">
        <div class="form-row">
          <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" placeholder="+966 50 123 4567">
          </div>
          
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="info@milano-furniture.com">
          </div>
        </div>
        
        <div class="form-group">
          <label>العنوان</label>
          <input type="text" id="address" placeholder="الرياض، المملكة العربية السعودية">
        </div>
        
        <div class="form-group">
          <label>ساعات العمل</label>
          <input type="text" id="working_hours" placeholder="السبت - الخميس: 9 صباحاً - 10 مساءً">
        </div>
        
        <div class="form-group">
          <label>رابط خريطة Google Maps (iframe)</label>
          <textarea id="map_embed_url" placeholder="الصق رابط iframe من Google Maps هنا..." style="min-height:100px;"></textarea>
          <p style="font-size:0.85rem; color:#666; margin-top:8px;">
            للحصول على الرابط: افتح Google Maps → اختر الموقع → مشاركة → تضمين الخريطة → انسخ الكود
          </p>
        </div>
        
        <button type="submit" class="btn btn-primary" style="padding:14px 40px;">
          <i class="fas fa-save"></i> حفظ معلومات التواصل
        </button>
      </form>
    </div>
  </main>

  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadContact);

    async function loadContact() {
      try {
        const response = await fetch('/api/contact');
        const contact = await response.json();
        
        if (contact) {
          document.getElementById('phone').value = contact.phone || '';
          document.getElementById('email').value = contact.email || '';
          document.getElementById('address').value = contact.address || '';
          document.getElementById('working_hours').value = contact.working_hours || '';
          document.getElementById('map_embed_url').value = contact.map_embed_url || '';
        }
      } catch (error) {
        console.error('Error loading contact:', error);
      }
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
      
      try {
        const contactData = {
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
          address: document.getElementById('address').value,
          working_hours: document.getElementById('working_hours').value,
          map_embed_url: document.getElementById('map_embed_url').value
        };
        
        const response = await fetch('/api/contact', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(contactData)
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('تم حفظ معلومات التواصل بنجاح!', 'success');
        } else {
          showAlert('حدث خطأ أثناء الحفظ', 'danger');
        }
      } catch (error) {
        showAlert('حدث خطأ: ' + error.message, 'danger');
      }
      
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-save"></i> حفظ معلومات التواصل';
    });
  </script>
</body>
</html>
