<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإعدادات - Milano Furniture</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: var(--light-gray); padding-top: 80px; }
    .settings-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .settings-header { background: var(--black); color: var(--white); padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 30px; }
    .settings-header h1 { color: var(--gold); margin-bottom: 10px; }
    .settings-header p { color: #ccc; }
    .settings-card { background: var(--white); border-radius: 15px; padding: 30px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .settings-card h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--black); padding-bottom: 10px; border-bottom: 2px solid var(--light-gray); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--black); }
    .form-group input {
      width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px;
      font-size: 1rem; font-family: 'Cairo', sans-serif; transition: var(--transition); direction: ltr;
    }
    .form-group input:focus { outline: none; border-color: var(--gold); }
    .form-group .hint { font-size: 0.85rem; color: var(--gray); margin-top: 5px; }
    .password-strength { height: 4px; border-radius: 2px; margin-top: 5px; transition: var(--transition); }
    .btn-group { display: flex; gap: 15px; margin-top: 20px; }
    .btn-save { background: var(--gold); color: var(--black); border: none; padding: 12px 30px; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .btn-save:hover { background: var(--gold-dark); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 12px 30px; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .btn-back:hover { background: var(--gold); color: var(--black); }
    .alert { padding: 12px 20px; border-radius: 10px; margin-bottom: 15px; font-weight: 600; display: none; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .user-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
    .user-info-item { padding: 15px; background: var(--light-gray); border-radius: 10px; }
    .user-info-item label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--gray); font-size: 0.9rem; }
    .user-info-item span { font-size: 1.1rem; color: var(--black); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <a href="/" class="nav-logo">
        <img src="/images/logo/logo.png" alt="Milano" onerror="this.style.display='none'">
        <h1>Milano</h1>
      </a>
      <ul class="nav-links">
        <li><a href="/">الرئيسية</a></li>
        <li><a href="/#gallery">المعرض</a></li>
        <li><a href="/account"><i class="fas fa-user"></i> حسابي</a></li>
        <li id="authNav"></li>
      </ul>
      <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div class="settings-container">
    <div class="settings-header">
      <h1><i class="fas fa-cog"></i> إعدادات الحساب</h1>
      <p id="welcomeName">إدارة حسابك وتغيير البيانات</p>
    </div>

    <!-- User Info -->
    <div class="settings-card">
      <h2><i class="fas fa-user"></i> معلومات الحساب</h2>
      <div class="user-info">
        <div class="user-info-item">
          <label>اسم المستخدم</label>
          <span id="currentUsername">-</span>
        </div>
        <div class="user-info-item">
          <label>الرتبة</label>
          <span id="currentRole">-</span>
        </div>
      </div>
    </div>

    <!-- Change Username -->
    <div class="settings-card">
      <h2><i class="fas fa-pen"></i> تغيير اسم المستخدم</h2>
      <div id="usernameAlert" class="alert"></div>
      <div class="form-group">
        <label>اسم المستخدم الجديد</label>
        <input type="text" id="newUsername" placeholder="أدخل اسم المستخدم الجديد" dir="ltr">
        <p class="hint">3 أحرف على الأقل - أرقام وأحرف فقط</p>
      </div>
      <div class="btn-group">
        <button class="btn-save" onclick="changeUsername()"><i class="fas fa-save"></i> حفظ الاسم</button>
      </div>
    </div>

    <!-- Change Password -->
    <div class="settings-card">
      <h2><i class="fas fa-key"></i> تغيير كلمة المرور</h2>
      <div id="passwordAlert" class="alert"></div>
      <div class="form-group">
        <label>كلمة المرور الحالية</label>
        <input type="password" id="currentPassword" placeholder="أدخل كلمة المرور الحالية" dir="ltr">
      </div>
      <div class="form-group">
        <label>كلمة المرور الجديدة</label>
        <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة" dir="ltr">
        <div class="password-strength" id="passwordStrength"></div>
        <p class="hint">8 أحرف على الأقل - يجب أن تحتوي على أحرف وأرقام</p>
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور الجديدة" dir="ltr">
      </div>
      <div class="btn-group">
        <button class="btn-save" onclick="changePassword()"><i class="fas fa-save"></i> تغيير كلمة المرور</button>
        <a href="/account" class="btn-back"><i class="fas fa-arrow-right"></i> رجوع</a>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', loadSettings);

    async function loadSettings() {
      try {
        const res = await fetch('/api/auth/check');
        const data = await res.json();
        if (!data.loggedIn) {
          window.location.href = '/login';
          return;
        }
        currentUser = data.user;
        document.getElementById('welcomeName').textContent = 'مرحباً، ' + currentUser.username;
        document.getElementById('currentUsername').textContent = currentUser.username;
        document.getElementById('currentRole').textContent = currentUser.role === 'admin' ? 'مدير' : 'مستخدم';
        document.getElementById('newUsername').value = currentUser.username;

        if (currentUser.role === 'admin') {
          document.getElementById('authNav').innerHTML = '<a href="/admin" class="nav-admin-btn"><i class="fas fa-cog"></i> لوحة التحكم</a>';
        }

        document.querySelector('.mobile-menu-btn').addEventListener('click', () => {
          document.querySelector('.nav-links').classList.toggle('active');
        });
      } catch (error) {
        window.location.href = '/login';
      }
    }

    function showAlert(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'alert alert-' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function changeUsername() {
      const newUsername = document.getElementById('newUsername').value.trim();
      if (!newUsername || newUsername.length < 3) {
        showAlert('usernameAlert', 'اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'danger');
        return;
      }
      if (!/^[a-zA-Z0-9_]+$/.test(newUsername)) {
        showAlert('usernameAlert', 'اسم المستخدم يجب أن يحتوي على أحرف وأرقام فقط', 'danger');
        return;
      }

      try {
        const res = await fetch('/api/account/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: newUsername })
        });
        const data = await res.json();
        if (data.success) {
          showAlert('usernameAlert', 'تم تغيير اسم المستخدم بنجاح!', 'success');
          currentUser.username = newUsername;
          document.getElementById('currentUsername').textContent = newUsername;
        } else {
          showAlert('usernameAlert', data.error, 'danger');
        }
      } catch (error) {
        showAlert('usernameAlert', 'حدث خطأ: ' + error.message, 'danger');
      }
    }

    async function changePassword() {
      const current = document.getElementById('currentPassword').value;
      const newPass = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!current) {
        showAlert('passwordAlert', 'أدخل كلمة المرور الحالية', 'danger');
        return;
      }
      if (!newPass || newPass.length < 8) {
        showAlert('passwordAlert', 'كلمة المرور الجديدة يجب أن تكون 8 أحرف على الأقل', 'danger');
        return;
      }
      if (!/[a-zA-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
        showAlert('passwordAlert', 'كلمة المرور الجديدة يجب أن تحتوي على أحرف وأرقام', 'danger');
        return;
      }
      if (newPass !== confirm) {
        showAlert('passwordAlert', 'كلمتا المرور غير متطابقتين', 'danger');
        return;
      }

      try {
        const res = await fetch('/api/account/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword: current, newPassword: newPass })
        });
        const data = await res.json();
        if (data.success) {
          showAlert('passwordAlert', 'تم تغيير كلمة المرور بنجاح!', 'success');
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
          updatePasswordStrength('');
        } else {
          showAlert('passwordAlert', data.error, 'danger');
        }
      } catch (error) {
        showAlert('passwordAlert', 'حدث خطأ: ' + error.message, 'danger');
      }
    }

    document.getElementById('newPassword').addEventListener('input', (e) => {
      updatePasswordStrength(e.target.value);
    });

    function updatePasswordStrength(password) {
      const bar = document.getElementById('passwordStrength');
      if (!password) {
        bar.style.width = '0';
        bar.style.background = 'transparent';
        return;
      }
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[a-zA-Z]/.test(password) && /[0-9]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      const colors = ['#dc3545', '#fd7e14', '#ffc107', '#28a745'];
      const widths = ['25%', '50%', '75%', '100%'];
      bar.style.width = widths[score] || '0';
      bar.style.background = colors[score] || '#dc3545';
    }
  </script>
</body>
</html>
